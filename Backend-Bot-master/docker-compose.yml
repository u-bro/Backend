services:
  fastapi_app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.backend.main:app --workers 1 --host 0.0.0.0 --port 5000
    restart: unless-stopped
    environment:
      DB_HOST: db
    depends_on:
      - db
      - migration

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/db-files
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./config/postgresql.conf:/var/lib/postgresql/data/postgresql.conf

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade heads"
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  admin_service:
    build:
      context: ./admin_service
      dockerfile: Dockerfile
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_SCHEMA: admin_public
    depends_on:
      - migration
      - db

volumes:
  postgres_data_dev:
  postgres_data_prod:
