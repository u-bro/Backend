services:
  fastapi_app:
    env_file:
      - .env-dev
    ports:
      - "6666:5000"
    volumes:
      - /www/api.dev.u-bro.ru/staticfiles:/app/staticfiles

  db:
    env_file:
      - .env-dev
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/db-files
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./config/postgresql.conf:/var/lib/postgresql/data/postgresql.conf
      - ./logs/postgres-dev:/var/log/postgresql

  migration:
    env_file:
      - .env-dev

  admin_service:
    env_file:
      - .env-dev
    ports:
      - "8001:8000"
